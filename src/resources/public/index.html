<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Multi-User Chat</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #chat-box { width: 450px; height: 400px; background: #1e1e1e; border: 1px solid #333; border-radius: 8px; padding: 15px; overflow-y: auto; margin-bottom: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .controls { display: flex; width: 480px; gap: 5px; }
        input { flex-grow: 1; padding: 12px; border: 1px solid #333; background: #2a2a2a; color: white; border-radius: 4px; outline: none; }
        button { padding: 12px 20px; background: #7050dd; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #583cc2; }
        .msg { margin-bottom: 8px; line-height: 1.4; }
    </style>
</head>
<body>

    <h2>☁️ Cloud WebSocket Chat Room</h2>
    <div id="chat-box"></div>

    <div class="controls">
        <input type="text" id="message-input" placeholder="Type a message or /nick YourName..." onkeydown="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        // Automatically determine if we are connecting to localhost or live Railway cloud
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/chat`;
        
        // Open the WebSocket connection directly from the browser!
        const ws = new WebSocket(wsUrl);
        const chatBox = document.getElementById('chat-box');

        // Listen for incoming messages from the Java backend broadcast
        ws.onmessage = (event) => {
            const msgElement = document.createElement('div');
            msgElement.className = 'msg';
            msgElement.textContent = event.data;
            chatBox.appendChild(msgElement);
            chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to bottom
        };

        function sendMessage() {
            const input = document.getElementById('message-input');
            if (input.value.trim() !== "") {
                ws.send(input.value); // Send the text directly through the WebSocket
                input.value = "";
            }
        }
    </script>
</body>
</html>
