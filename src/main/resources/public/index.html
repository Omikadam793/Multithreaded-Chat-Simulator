<h2>☁️ Cloud WebSocket Chat Room</h2>

```

</div>

<script>

    const protocol =
        window.location.protocol === "https:"
            ? "wss:"
            : "ws:";

    const wsUrl =
        `${protocol}//${window.location.host}/chat`;

    const chatBox =
        document.getElementById("chat-box");

    const status =
        document.getElementById("status");

    let ws;

    function connect() {

        ws = new WebSocket(wsUrl);

        ws.onopen = () => {

            status.textContent =
                "🟢 Connected";

            status.style.color =
                "#00e676";
        };

        ws.onmessage = (event) => {

            const div =
                document.createElement("div");

            div.className = "msg";

            if (
                event.data.startsWith("SERVER:")
            ) {
                div.classList.add("system");
            }

            div.textContent = event.data;

            chatBox.appendChild(div);

            chatBox.scrollTop =
                chatBox.scrollHeight;
        };

        ws.onclose = () => {

            status.textContent =
                "🔴 Disconnected - Reconnecting...";

            status.style.color =
                "#ff5252";

            setTimeout(connect, 3000);
        };

        ws.onerror = () => {

            status.textContent =
                "⚠️ Connection Error";
        };
    }

    function sendMessage() {

        const input =
            document.getElementById(
                "message-input"
            );

        const message =
            input.value.trim();

        if (
            message === "" ||
            ws.readyState !== WebSocket.OPEN
        ) {
            return;
        }

        ws.send(message);

        input.value = "";
    }

    connect();

</script>

</body>
